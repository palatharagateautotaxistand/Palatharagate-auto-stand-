<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palathara Gate Auto Taxi Stand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@1,700;1,900&display=swap');
        
        body { background-color: #ffde59; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        .app-container { max-width: 420px; margin: 0 auto; min-height: 100vh; padding-bottom: 110px; background-color: #ffde59; }
        
        .title-box { background-color: #ffde59; border: 5px solid #000; padding: 20px; border-radius: 20px; box-shadow: 8px 8px 0 #000; margin: 20px; text-align: center; }
        .trusted-partner { font-family: 'Poppins', sans-serif; font-weight: 900; font-style: italic; background: linear-gradient(45deg, #ff0000, #ff8c00, #4b0082, #ff0000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: block; background-size: 200% auto; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }

        .driver-card { background: #ffffff !important; border-radius: 25px; border: 3.5px solid #000; padding: 12px; margin: 0 15px 15px 15px; box-shadow: 6px 6px 0 #000; display: flex; align-items: center; justify-content: space-between; }
        .driver-name { font-family: 'Poppins', sans-serif; font-style: italic; font-weight: 900; font-size: 1.1rem; color: #000; }
        .driver-phone { font-family: 'Poppins', sans-serif; font-style: italic; font-weight: 700; color: #333; }

        .auto-emoji { font-size: 45px; margin-right: 12px; line-height: 1; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 420px; margin: 0 auto; background: #000; border-radius: 35px 35px 0 0; padding: 15px; display: flex; justify-content: space-around; z-index: 50; }
        .nav-item { text-align: center; color: white; }
        .nav-emergency { color: #ff3c00; }
        
        /* Emergency Modal Styling */
        #emergencyModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #ffde59; padding: 25px; rounded: 35px; width: 100%; max-width: 320px; border: 4px solid #000; box-shadow: 8px 8px 0 #000; border-radius: 30px; }
        .emergency-btn { width: 100%; display: flex; align-items: center; justify-content: space-between; bg-white: white; padding: 15px; margin-top: 10px; border-radius: 15px; border: 2.5px solid #000; font-weight: 900; color: black; background: white; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="text-center pt-6">
        <div class="title-box">
            <h1 class="text-3xl font-black italic uppercase text-black">പാലത്തറ ഗേറ്റ് <br> ഓട്ടോ ടാക്സി സ്റ്റാൻഡ്</h1>
        </div>
        <div class="mt-2 text-center">
            <span class="trusted-partner text-xl italic uppercase">Your Trusted Ride Partner</span>
        </div>
    </div>

    <div class="px-6 mt-8 mb-4 flex items-center">
        <div class="h-[3px] bg-black flex-grow"></div>
        <p class="mx-3 text-[10px] font-black italic text-black uppercase">ലഭ്യമായ ഡ്രൈവർമാർ 👇</p>
        <div class="h-[3px] bg-black flex-grow"></div>
    </div>

    <div id="driversList"></div>

    <div id="emergencyModal" onclick="closeEmergency()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="text-2xl font-black text-center border-b-4 border-black pb-3 text-black uppercase">Emergency</h2>
            
            <button onclick="window.location.href='tel:108'" class="emergency-btn">
                <span>AMBULANCE</span><i class="fas fa-ambulance text-red-600 text-2xl"></i>
            </button>
            
            <button onclick="window.location.href='tel:101'" class="emergency-btn">
                <span>FIRE FORCE</span><i class="fas fa-fire-extinguisher text-orange-600 text-2xl"></i>
            </button>
            
            <button onclick="window.location.href='tel:112'" class="emergency-btn">
                <span>POLICE (112)</span><i class="fas fa-shield-alt text-blue-600 text-2xl"></i>
            </button>
            
            <p class="text-center font-bold text-black mt-6 cursor-pointer" onclick="closeEmergency()">അടയ്ക്കുക ✖</p>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.reload()"><i class="fas fa-house-chimney text-xl"></i><p class="text-[10px]">ഹോം</p></div>
        <div class="nav-item" onclick="window.location.href='tel:8129377047'"><i class="fas fa-phone-volume text-xl"></i><p class="text-[10px]">വിളിക്കുക</p></div>
        <div class="nav-item nav-emergency" onclick="openEmergency()"><i class="fas fa-triangle-exclamation text-xl"></i><p class="text-[10px]">അപകടം</p></div>
    </div>
</div>

<script>
    const drivers = [
        {name: "ഹനീഫ (Casper)", phone: "8129377047"},
        {name: "ഉമ്മർ", phone: "9544257381"},
        {name: "സുൽഫികർ", phone: "9895783735"},
        {name: "അബ്ബാസ്", phone: "9744106864"},
        {name: "വിജീഷ് (കാർത്തിക)", phone: "9946303174"},
        {name: "റസാഖ്", phone: "9995113455"},
        {name: "പ്രസാദ് (കരിന്തണ്ടൻ)", phone: "9961929035"},
        {name: "മുത്തു (സহൽ)", phone: "9846883806"},
        {name: "കുഞ്ഞിപ്പ", phone: "9995337587"},
        {name: "സിദ്ദിഖ്", phone: "9745967372"},
        {name: "അബുടിക്ക", phone: "9745413184"},
        {name: "രാജൻ (സീസൺ)", phone: "9539932008"},
        {name: "അബ്ദുള്ള (ഹുബ്ബ്റസൂൽ)", phone: "8606409218"},
        {name: "സുഭാഷ്", phone: "9846482524"},
        {name: "വില്ലക്ക", phone: "7034082342"}
    ];

    const listDiv = document.getElementById('driversList');
    drivers.forEach(d => {
        listDiv.innerHTML += `
            <div class="driver-card">
                <div class="flex items-center">
                    <div class="auto-emoji">🛺</div>
                    <div class="driver-info">
                        <p class="driver-name">${d.name}</p>
                        <p class="driver-phone">${d.phone}</p>
                    </div>
                </div>
                <div class="flex space-x-2">
                    <button onclick="saveVCard('${d.name}', '${d.phone}')" class="bg-gray-100 p-2 rounded-full border border-black text-black"><i class="fas fa-user-plus"></i></button>
                    <a href="tel:${d.phone}" class="bg-green-600 text-white p-2 rounded-full border border-black"><i class="fas fa-phone-alt"></i></a>
                </div>
            </div>
        `;
    });

    function saveVCard(n, p) { const v = `BEGIN:VCARD\nVERSION:3.0\nFN:${n}\nTEL:${p}\nEND:VCARD`; const b = new Blob([v], {type:"text/vcard"}); const u = window.URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = `${n}.vcf`; a.click(); }
    function openEmergency() { document.getElementById('emergencyModal').style.display = 'flex'; }
    function closeEmergency() { document.getElementById('emergencyModal').style.display = 'none'; }
</script>
</body>
</html>
